name: SEO Maintenance (24h)

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply deterministic SEO fixes
        run: npm run seo:fix
      - name: Build
        run: npm run build
      - name: Audit
        run: npm run seo:audit
      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain src/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/regionSeo.ts src/data/venueContent.ts
            git commit -m "chore(seo): auto maintenance"
            git push
          else
            echo "no changes"
          fi
